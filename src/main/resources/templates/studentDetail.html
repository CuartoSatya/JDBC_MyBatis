<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>受講生詳細</title>
</head>
<body>
<h1>受講生詳細</h1>

<table border="1">
    <tr><th>ID</th><td th:text="${studentDetail.student.id}"></td></tr>
    <tr><th>氏名</th><td th:text="${studentDetail.student.name}"></td></tr>
    <tr><th>カナ名</th><td th:text="${studentDetail.student.kanaName}"></td></tr>
    <tr><th>ニックネーム</th><td th:text="${studentDetail.student.nickname}"></td></tr>
    <tr><th>メールアドレス</th><td th:text="${studentDetail.student.mailAddress}"></td></tr>
    <tr><th>地域</th><td th:text="${studentDetail.student.address}"></td></tr>
    <tr><th>年齢</th><td th:text="${studentDetail.student.age}"></td></tr>
    <tr><th>性別</th><td th:text="${studentDetail.student.sex}"></td></tr>
    <tr><th>備考</th><td th:text="${studentDetail.student.remark}"></td></tr>
</table>

<br>

<h2>受講コース情報</h2>

<table border="1">
    <tr>
        <th>コースID</th>
        <th>コース名</th>
        <th>開始日</th>
        <th>終了予定日</th>
        <th>申し込み状況</th>
    </tr>

    <tr th:if="${#lists.isEmpty(studentDetail.studentCourses)}">
        <td colspan="5">受講コースはありません</td>
    </tr>

    <tr th:each="course : ${studentDetail.studentCourses}">
        <td th:text="${course.id}"></td>
        <td th:text="${course.courseName}"></td>
        <td th:text="${#temporals.format(course.startDate, 'yyyy/MM/dd')}"></td>
        <td th:text="${#temporals.format(course.assuredFinishDate, 'yyyy/MM/dd')}"></td>

        <td th:switch="${course.statusId}">
            <span th:case="0">仮申込</span>
            <span th:case="1">本申込</span>
            <span th:case="2">受講中</span>
            <span th:case="3">受講終了</span>
            <span th:case="*">未設定</span>
        </td>
    </tr>
</table>
<br>
<a th:href="@{/studentList}">戻る</a>

</body>
</html>
