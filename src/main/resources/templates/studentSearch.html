<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>生徒情報検索</title>
</head>
<body>
<h1>条件を指定して生徒検索</h1>

<form th:action="@{/student/search}" method="get">

  <div>
    <label for="name">名前</label>
    <input type="text" id="name" name="name" th:value="${name}">
  </div>

  <div>
  <label for="courseName">受講コース名</label>
  <input type="text" id="courseName" name="courseName" th:value="${courseName}">
  </div>

  <button type="submit">検索</button>
</form>

<table border="1" th:if="${results != null and !#lists.isEmpty(results)}">
  <thead>
  <tr>
    <th>生徒ID</th>
    <th>生徒名</th>
    <th>フリガナ</th>
    <th>ニックネーム</th>
    <th>メールアドレス</th>
    <th>住所</th>
    <th>年齢</th>
    <th>性別</th>
    <th>備考</th>
    <th>退会済み</th>
    <th>受講コース名</th>
    <th>申し込み状況</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="result : ${results}">
    <td th:text="${result.studentId}"></td>
    <td th:text="${result.name}"></td>
    <td th:text="${result.kanaName}"></td>
    <td th:text="${result.nickname}"></td>
    <td th:text="${result.mailAddress}"></td>
    <td th:text="${result.address}"></td>
    <td th:text="${result.age}"></td>
    <td th:text="${result.sex}"></td>
    <td th:text="${result.remark}"></td>
    <td th:text="${result.deleted}"></td>
    <td th:text="${result.courseName}"></td>
    <td th:switch="${result.statusId}">
      <span th:case="0">仮申込</span>
      <span th:case="1">本申込</span>
      <span th:case="2">受講中</span>
      <span th:case="3">受講終了</span>
      <span th:case="*">未設定</span>
    </td>
  </tr>
  </tbody>
</table>

<p th:if="${results != null and #lists.isEmpty(results) and courseName != null and courseName != ''}">
  該当する生徒はいません。
</p>
</body>
</html>
